name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      ANTHROPIC_BASE_URL: http://127.0.0.1:8788
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Start AceData Cloud proxy (x-api-key → Bearer)
        env:
          UPSTREAM: https://api.acedata.cloud
          ACEDATA_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          cat > /tmp/proxy.py <<'PY'
          import http.server, socketserver, urllib.request, ssl, os, sys
          UPSTREAM = os.environ["UPSTREAM"].rstrip("/")
          TOKEN = os.environ["ACEDATA_TOKEN"]
          HOP = {"host","content-length","connection","keep-alive","proxy-authenticate","proxy-authorization","te","trailers","transfer-encoding","upgrade"}
          class H(http.server.BaseHTTPRequestHandler):
              protocol_version = "HTTP/1.1"
              def _proxy(self, method):
                  body = self.rfile.read(int(self.headers.get("Content-Length") or 0)) if method in ("POST","PUT","PATCH") else None
                  url = UPSTREAM + self.path
                  req = urllib.request.Request(url, data=body, method=method)
                  for k,v in self.headers.items():
                      if k.lower() in HOP or k.lower() in ("authorization","x-api-key"):
                          continue
                      req.add_header(k, v)
                  req.add_header("Authorization", f"Bearer {TOKEN}")
                  try:
                      resp = urllib.request.urlopen(req, timeout=600)
                      data = resp.read()
                      self.send_response(resp.status)
                      for k,v in resp.headers.items():
                          if k.lower() in HOP: continue
                          self.send_header(k,v)
                      self.send_header("Content-Length", str(len(data)))
                      self.end_headers()
                      self.wfile.write(data)
                  except urllib.error.HTTPError as e:
                      data = e.read()
                      self.send_response(e.code)
                      for k,v in e.headers.items():
                          if k.lower() in HOP: continue
                          self.send_header(k,v)
                      self.send_header("Content-Length", str(len(data)))
                      self.end_headers()
                      self.wfile.write(data)
              def do_GET(self): self._proxy("GET")
              def do_POST(self): self._proxy("POST")
              def do_PUT(self): self._proxy("PUT")
              def do_DELETE(self): self._proxy("DELETE")
              def log_message(self, *a, **k): sys.stderr.write("[proxy] " + (a[0] % a[1:]) + "\n")
          class T(socketserver.ThreadingMixIn, http.server.HTTPServer):
              daemon_threads = True
              allow_reuse_address = True
          T(("127.0.0.1", 8788), H).serve_forever()
          PY
          nohup python3 /tmp/proxy.py > /tmp/proxy.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8788/ | grep -q .; then break; fi
            sleep 0.3
          done
          echo "proxy up"

      - name: Run Claude Code via AceData Cloud
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: dummy-not-used
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-opus-4-7
          show_full_output: 'true'

      - name: Proxy log (on failure)
        if: failure()
        run: tail -200 /tmp/proxy.log || true
